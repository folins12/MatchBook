<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MatchBook — Metrics Dashboard</title>
  <link rel="stylesheet" href="style.css">
  <style>
    /* ─── DASHBOARD (admin only) ─────────────────────────────────────────────── */
    .dash {
      max-width: 1280px; margin: 0 auto; padding: calc(var(--nav-h) + 28px) 32px 56px;
    }
    /* Header */
    .dash-head {
      display: flex; align-items: flex-start; justify-content: space-between;
      gap: 24px; flex-wrap: wrap;
      padding-bottom: 20px; border-bottom: 1px solid var(--border);
    }
    .dash-brand { display: flex; align-items: baseline; gap: 18px; }
    .dash-wordmark { font-family: var(--font-display); font-size: 2rem; font-weight: 800; letter-spacing: -.01em; color: var(--ink); }
    .dash-wordmark em { color: var(--gold); font-style: italic; font-weight: 700; }
    .dash-kicker {
      font-family: var(--font-mono); font-size: .68rem; letter-spacing: .18em;
      text-transform: uppercase; color: var(--ink-3); line-height: 1.5;
      transform: translateY(2px);
    }
    .dash-tools { display: flex; align-items: center; gap: 14px; flex-wrap: wrap; }
    .mock-pill {
      font-family: var(--font-mono); font-size: .66rem; letter-spacing: .14em;
      text-transform: uppercase; color: var(--gold);
      background: var(--gold-light); border-radius: var(--radius-sm);
      padding: 9px 14px; line-height: 1.3; max-width: 120px;
    }
    .tf-group { display: inline-flex; background: var(--bg-alt); border-radius: 100px; padding: 3px; }
    .tf-btn {
      font-family: var(--font-body); font-size: .82rem; font-weight: 600; color: var(--ink-3);
      background: none; border: none; border-radius: 100px; padding: 8px 16px;
      transition: var(--transition);
    }
    .tf-btn:hover { color: var(--ink); }
    .tf-btn.active { background: var(--bg-card); color: var(--accent); box-shadow: var(--shadow-sm); }

    /* Hero */
    .dash-hero { margin: 36px 0 30px; }
    .dash-hero h1 {
      font-family: var(--font-display); font-weight: 800;
      font-size: clamp(2.1rem, 4.4vw, 3.4rem); line-height: 1.05; letter-spacing: -.015em;
      color: var(--ink);
    }
    .dash-hero h1 em { color: var(--accent); font-style: italic; }
    .dash-sub { color: var(--ink-3); font-size: 1.02rem; margin-top: 12px; font-style: italic; }

    /* KPI cards — one per AARRR stage */
    .kpi-row {
      display: grid; grid-template-columns: repeat(4, 1fr); gap: 18px; margin-bottom: 18px;
    }
    .kpi {
      background: var(--bg-card); border: 1px solid var(--border); border-radius: var(--radius-lg);
      padding: 26px 26px 28px; position: relative;
      min-height: 280px; display: flex; flex-direction: column;
    }
    /* stage tag: emerald roman numeral + gold stage name */
    .kpi-tag {
      font-family: var(--font-mono); font-size: .66rem; letter-spacing: .16em;
      text-transform: uppercase; display: flex; align-items: center; gap: 9px; margin-bottom: 18px;
    }
    .kpi-tag-roman {
      display: inline-flex; align-items: center; justify-content: center;
      min-width: 22px; height: 22px; padding: 0 6px; border-radius: 6px;
      background: var(--accent-light); color: var(--accent); font-weight: 700; font-size: .72rem;
    }
    .kpi-tag-name { color: var(--gold); }
    /* KEY metric — the hero of each card */
    .kpi-key { display: flex; align-items: baseline; gap: 12px; }
    .kpi-num {
      font-family: var(--font-display); font-weight: 800; color: var(--accent);
      font-size: 3.7rem; line-height: .9; letter-spacing: -.02em;
    }
    .kpi-num span { font-size: 1.3rem; font-weight: 700; color: var(--ink-3); margin-left: 1px; }
    .kpi-pct {
      align-self: center; font-family: var(--font-mono); font-size: .82rem; font-weight: 600;
      color: var(--accent); background: var(--accent-light); padding: 4px 10px; border-radius: 100px;
    }
    .kpi-pct.zero { color: var(--ink-3); background: var(--bg-alt); }
    .kpi-base {
      align-self: center; font-family: var(--font-mono); font-size: .64rem; letter-spacing: .12em;
      text-transform: uppercase; color: var(--gold); background: var(--gold-light);
      padding: 5px 10px; border-radius: 100px;
    }
    .kpi-label { font-family: var(--font-display); font-size: 1.2rem; margin: 12px 0 0; color: var(--ink); line-height: 1.25; }
    .kpi-key-bar { height: 6px; border-radius: 100px; background: var(--bg-alt); overflow: hidden; margin-top: 14px; }
    .kpi-key-bar-fill { height: 100%; border-radius: 100px; background: var(--accent); }
    /* explanatory note (cards with no sub-metrics) */
    .kpi-note { font-size: .82rem; color: var(--ink-3); line-height: 1.5; margin-top: 18px; padding-top: 16px; border-top: 1px dashed var(--border); }
    /* SECONDARY signals (sub-metrics) — visually demoted, gold accents */
    .kpi-subs { margin-top: 18px; padding-top: 16px; border-top: 1px dashed var(--border); }
    .kpi-subs-title {
      font-family: var(--font-mono); font-size: .6rem; letter-spacing: .16em; text-transform: uppercase;
      color: var(--ink-4); margin-bottom: 13px;
    }
    .kpi-sub + .kpi-sub { margin-top: 13px; }
    .kpi-sub-top { display: flex; align-items: baseline; justify-content: space-between; gap: 8px; margin-bottom: 6px; }
    .kpi-sub-name { font-size: .87rem; color: var(--ink-2); font-weight: 500; }
    .kpi-sub-val { font-family: var(--font-mono); font-size: .76rem; color: var(--ink-3); white-space: nowrap; }
    .kpi-sub-val strong { color: var(--ink); font-weight: 700; }
    .kpi-sub-bar { height: 5px; border-radius: 100px; background: var(--bg-alt); overflow: hidden; }
    .kpi-sub-bar-fill { height: 100%; border-radius: 100px; background: var(--gold); }
    .kpi-sub-foot { font-size: .72rem; color: var(--ink-4); margin-top: 6px; font-style: italic; }

    /* Retention exclusion note */
    .dash-note {
      font-size: .86rem; color: var(--ink-3); line-height: 1.55;
      background: var(--bg-card); border: 1px dashed var(--border);
      border-radius: var(--radius); padding: 14px 18px; margin-bottom: 8px;
    }
    .dash-note strong { color: var(--accent); font-weight: 700; }

    /* Footer */
    .dash-foot {
      margin-top: 30px; padding-top: 18px; border-top: 1px solid var(--border);
      font-family: var(--font-mono); font-size: .76rem; letter-spacing: .08em; color: var(--ink-3);
    }

    @media (max-width: 980px) {
      .kpi-row { grid-template-columns: repeat(2, 1fr); }
    }
    @media (max-width: 560px) {
      .dash { padding: 28px 18px 40px; }
      .kpi-row { grid-template-columns: 1fr; }
      .dash-head { flex-direction: column; }
    }
  </style>
</head>
<body>
<nav class="mb-nav"></nav>

<main class="dash" id="dashRoot" style="display:none;">

  <!-- Header -->
  <header class="dash-head">
    <div class="dash-brand">
      <div class="dash-wordmark">Match<em>Book</em></div>
      <div class="dash-kicker">Metrics<br>Dashboard</div>
    </div>
    <div class="dash-tools">
      <div class="tf-group">
        <span class="tf-btn active">All Responses</span>
      </div>
    </div>
  </header>

  <!-- Hero -->
  <section class="dash-hero">
    <h1 id="heroLine"></h1>
    <p class="dash-sub" id="heroSub"></p>
  </section>

  <!-- KPI cards -->
  <section class="kpi-row" id="kpiRow"></section>

  <!-- Why only four stages -->
  <p class="dash-note"><strong>Retention</strong> — the one AARRR stage we leave out — isn't measurable here: a textbook is bought once per school year, so there's no repeat-usage to track inside the pilot window.</p>

  <!-- Footer -->
  <footer class="dash-foot">matchbook.it/metrics</footer>

</main>

<script src="db.js"></script>
<script src="app.js"></script>
<script>
  let METRICS = null;

  // Pilot cohort size — the denominator behind every rate on this board.
  const N = 5;

  // The funnel, in AARRR order. Each card = one stage with a single KEY metric;
  // `subs` are secondary signals shown (demoted) inside the same card. Numbers are
  // the manually-entered pilot results (how many of N visitors qualified).
  const FUNNEL = [
    {
      roman: 'I', stage: 'Acquisition',
      key: { value: 5, base: true, label: 'Total site visitors' },
      note: '',
    },
    {
      roman: 'II', stage: 'Activation',
      key: { value: 5, label: 'Registered &amp; school linked' },
      subs: [
        { name: 'Willing to sell', value: 2, foot: 'Supply signal.' },
      ],
    },
    {
      roman: 'III', stage: 'Revenue',
      key: { value: 4, label: 'Willing to buy' },
      subs: [
        { name: 'Willing to boost', value: 1, foot: '€1.50 micro-transaction intent.' },
        { name: 'Willing to go PRO', value: 1, foot: '€5 / year subscription intent.' },
      ],
    },
    {
      roman: 'IV', stage: 'Referral',
      key: { value: 0, label: 'Clicked “Share”' },
      note: '',
    },
  ];

  const pct = (v) => Math.round((v / N) * 100);

  function card(c) {
    const k = c.key;
    const num = k.base ? `${k.value}` : `${k.value}<span>/ ${N}</span>`;
    const badge = k.base
      ? `<span class="kpi-base">Funnel base</span>`
      : `<span class="kpi-pct${k.value === 0 ? ' zero' : ''}">${pct(k.value)}%</span>`;
    const fill = k.base ? 100 : pct(k.value);

    const bottom = (c.subs && c.subs.length)
      ? `<div class="kpi-subs">
           <div class="kpi-subs-title">Secondary signals</div>
           ${c.subs.map(s => `
           <div class="kpi-sub">
             <div class="kpi-sub-top">
               <span class="kpi-sub-name">${s.name}</span>
               <span class="kpi-sub-val"><strong>${s.value}</strong> / ${N} · ${pct(s.value)}%</span>
             </div>
             <div class="kpi-sub-bar"><div class="kpi-sub-bar-fill" style="width:${pct(s.value)}%"></div></div>
             ${s.foot ? `<div class="kpi-sub-foot">${s.foot}</div>` : ''}
           </div>`).join('')}
         </div>`
      : `<div class="kpi-note">${c.note || ''}</div>`;

    return `
      <div class="kpi">
        <div class="kpi-tag"><span class="kpi-tag-roman">${c.roman}</span><span class="kpi-tag-name">${c.stage}</span></div>
        <div class="kpi-key">
          <div class="kpi-num">${num}</div>
          ${badge}
        </div>
        <div class="kpi-label">${k.label}</div>
        <div class="kpi-key-bar"><div class="kpi-key-bar-fill" style="width:${fill}%"></div></div>
        ${bottom}
      </div>`;
  }

  function render() {
    document.getElementById('heroLine').innerHTML =
      `What our first 5 visitors <em>told us</em>.`;
    document.getElementById('heroSub').textContent =
      `Survey responses from MatchBook's first ${N} visitors at Liceo Scientifico "Paolo Ruffini".`;
    document.getElementById('kpiRow').innerHTML = FUNNEL.map(card).join('');
  }

  document.addEventListener('DOMContentLoaded', () => {
    // Admin guard: must be signed in AND have the admin role.
    const user = DB.currentUser();
    if (!user || !user.active) { location.href = 'auth.html?next=dashboard.html'; return; }
    if (!DB.isAdmin(user)) {
      toast('The Metrics Dashboard is restricted to admins', 'warning', 3500);
      setTimeout(() => location.href = 'index.html', 1200);
      return;
    }
    METRICS = DB.getMetrics();
    document.getElementById('dashRoot').style.display = '';
    render();
  });
</script>
