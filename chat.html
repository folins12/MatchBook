<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MatchBook — Messages</title>
  <link rel="stylesheet" href="style.css">
  <style>
    body { overflow: hidden; }
    .chat-outer { height: calc(100vh - var(--nav-h)); margin-top: var(--nav-h); display: flex; flex-direction: column; }
    .chat-layout { flex: 1; overflow: hidden; border-radius: 0; border: none; border-top: 1px solid var(--border); margin: 0; }
    .chat-role-badge {
      display: inline-block;
      margin-left: 8px;
      padding: 2px 8px;
      border-radius: 999px;
      font-size: .65rem;
      font-weight: 700;
      letter-spacing: .06em;
      vertical-align: middle;
      text-transform: uppercase;
    }
    .chat-role-badge.chat-role-buyer  { background: var(--blue-light); color: var(--blue); }
    .chat-role-badge.chat-role-seller { background: var(--gold-light); color: var(--gold); }
  </style>
</head>
<body>
<nav class="mb-nav"></nav>

<div class="chat-outer">
  <div class="chat-layout">

    <!-- CONVERSATION LIST -->
    <div class="conv-list scrollbar-thin" id="convList">
      <div class="conv-list-header">
        💬 Messages
        <button class="btn btn-ghost btn-sm" onclick="location.href='announcements.html'" style="float:right;margin-top:-4px;">Browse →</button>
      </div>
      <div id="convItems"></div>
    </div>

    <!-- CHAT AREA -->
    <div class="chat-area" id="chatArea">
      <div class="empty-chat" id="emptyChatState">
        <div class="empty-chat-icon">💬</div>
        <h3 style="font-family:var(--font-display);margin-bottom:8px;">Select a conversation</h3>
        <p style="color:var(--ink-3);font-size:.9rem;">Or browse listings to start chatting with a seller.</p>
        <a href="announcements.html" class="btn btn-primary" style="margin-top:20px;">Browse listings</a>
      </div>
      <div id="activeChat" style="display:none;height:100%;flex-direction:column;display:none;">
        <div class="chat-header" id="chatHeader"></div>
        <div class="chat-messages scrollbar-thin" id="chatMessages"></div>
        <div class="chat-input-bar">
          <textarea class="form-input" id="chatInput" placeholder="Type a message…" rows="1" onkeydown="handleKey(event)"></textarea>
          <button class="btn btn-primary" onclick="sendMessage()">Send</button>
        </div>
      </div>
    </div>

  </div>
</div>

<script src="db.js"></script>
<script src="app.js"></script>
<script>
let currentUser = null;
let activeConvId = null;
let botTyping = false;

// ── BOT ENGINE ────────────────────────────────────────────────────────────────

const BOT_DELAYS = { think: [800, 1500], type: [1200, 2500] };

// Intent classification — order matters. Earlier patterns win, so more specific
// intents (availability, farewell) must be tested before generic ones (meeting, greeting).

const AVAILABILITY_PATTERNS = [
  /\b(still\s+(available|there|on\s+sale|for\s+sale)|is\s+it\s+(still\s+)?available|in\s+stock|already\s+sold|gone|taken|reserved)\b/i,
  /\bancora\s+(disponibile|in\s+vendita|c'è|ce\s+l'hai)\b/i,
];

const FAREWELL_PATTERNS = [
  /\b(bye|goodbye|see\s+you|see\s+ya|talk\s+later|cya|later|ttyl|gtg|gotta\s+go|ciao\s+ciao|arrivederci|a\s+presto)\b/i,
];

const THANKS_PATTERNS = [
  /\b(thanks|thank\s+you|thx|ty|cheers|appreciate|grazie|grazie\s+mille)\b/i,
];

const PRICE_PATTERNS = [
  /\b(price|cost|how much|€|euro|euros|budget|cheap|expensive|discount|lower|negotiate|offer|deal|pay)\b/i,
  /\d+\s*€|€\s*\d+/,
  /\b\d+(\.\d{2})?\s*(euro|euros|bucks)?\b/,
];

const MEETING_PATTERNS = [
  /\b(meet|meeting|tomorrow|today|when|where|time|location|place|school|cafeteria|pickup|pick up|come by|schedule|arrange|appoint)\b/i,
  /\b(morning|afternoon|evening|monday|tuesday|wednesday|thursday|friday|lun|mar|mer|gio|ven)\b/i,
];

const CONDITION_PATTERNS = [
  /\b(condition|damage|tear|stain|note|notes|mark|marks|used|pen|pencil|highlight|write|wrote|old|new|how is it|what'?s it like|underlining|underlined|annotated)\b/i,
];

const GREETING_PATTERNS = [
  /\b(hi|hello|hey|ciao|salve|buongiorno|buonasera|good morning|good evening|howdy|yo|hiya)\b/i,
];

function detectIntent(text) {
  // Specific intents first — keep this order or "still available" gets eaten by greeting/meeting.
  if (AVAILABILITY_PATTERNS.some(p => p.test(text))) return 'availability';
  if (FAREWELL_PATTERNS.some(p => p.test(text)))     return 'farewell';
  if (THANKS_PATTERNS.some(p => p.test(text)))       return 'thanks';
  if (PRICE_PATTERNS.some(p => p.test(text)))        return 'price';
  if (MEETING_PATTERNS.some(p => p.test(text)))      return 'meeting';
  if (CONDITION_PATTERNS.some(p => p.test(text)))    return 'condition';
  if (GREETING_PATTERNS.some(p => p.test(text)))     return 'greeting';
  return 'general';
}

function extractPrice(text) {
  const m = text.match(/€?\s*(\d+(?:[.,]\d{1,2})?)\s*€?/);
  return m ? parseFloat(m[1].replace(',', '.')) : null;
}

function getBotResponse(intent, userText, botRole, listing) {
  const listingPrice = listing ? listing.price : null;
  const bookTitle = listing ? listing.bookTitle : 'the book';
  const condStr = listing?.condition?.replace('_', ' ') || 'good';

  // CONVENTION: `buyer` = lines spoken by whoever is buying the book.
  //             `seller` = lines spoken by whoever is selling it.
  // `botRole` (set in triggerBot) picks which side the bot is playing in the
  // CURRENT conversation — the bot always speaks the opposite side of the user.
  const responses = {
    // "Hi, is the book still available?" — explicit availability question.
    // Sellers confirm/explain, buyers don't usually ask themselves but we cover it.
    availability: {
      seller: [
        `Yes, "${bookTitle}" is still available! 📚 Want to know anything specific?`,
        `Still up for grabs! It's in ${condStr} condition. Interested?`,
        `Yep, available — I haven't sold it yet. When could you pick it up?`,
        `Available! I've had a couple of people asking, so let me know if you want to reserve it.`,
      ],
      buyer: [
        `Just checking — is the book still up for sale? 🙏`,
        `Hey, wanted to confirm the listing is still active before I commit.`,
        `Is "${bookTitle}" still around, or has someone already taken it?`,
      ],
    },
    greeting: {
      seller: [
        `Hi! Thanks for your interest in "${bookTitle}". It's still available! 😊`,
        `Hello! Yes, "${bookTitle}" is available. What would you like to know?`,
        `Hey there! Great that you're interested. The book is in ${condStr} condition.`,
        `Hi 👋 happy to help — what would you like to know about the book?`,
      ],
      buyer: [
        `Hi there! 👋 I'm interested in "${bookTitle}". Is it still available?`,
        `Hello! I saw your listing for "${bookTitle}" — can you tell me more about it?`,
        `Hey! Looking to buy "${bookTitle}". How soon could we meet?`,
        `Hi! Just stumbled on your listing — quick question about the book if that's ok 🙂`,
      ],
    },
    // PRICE — totally rewritten. The previous version had buyer/seller swapped,
    // so the bot would haggle as if it owned the book when it didn't.
    price: {
      // Bot is the SELLER. User (buyer) is making them an offer or asking the price.
      seller: (() => {
        const offered = extractPrice(userText);
        if (offered && listingPrice) {
          if (offered < listingPrice * 0.75) return [
            `Hmm, ${formatPrice(offered)} is a bit low for the condition. I could go down to ${formatPrice(listingPrice * 0.90)} but not much further.`,
            `That's below what I was hoping for, sorry. My best is ${formatPrice(listingPrice * 0.92)}.`,
            `I can't really do ${formatPrice(offered)} — the book is in ${condStr} condition. How about ${formatPrice(listingPrice * 0.88)}?`,
          ];
          if (offered < listingPrice) return [
            `I could do ${formatPrice(offered)}, fair enough 🤝 Want to set up a pickup?`,
            `${formatPrice(offered)} works for me! Just pay the 30% deposit on the platform and we're set.`,
            `OK, ${formatPrice(offered)} it is. Where do you go to school? Easier to meet there.`,
          ];
          return [
            `${formatPrice(offered)} works for me! Let's arrange the handover. 🤝`,
            `Deal at ${formatPrice(offered)}! When can you come pick it up?`,
          ];
        }
        return [
          `The price is ${listingPrice ? formatPrice(listingPrice) : 'as listed'}. The book is in ${condStr} shape — but I'm open to a small negotiation 🙂`,
          `I listed it at ${listingPrice ? formatPrice(listingPrice) : 'the listed price'}. What were you thinking?`,
          `Asking ${listingPrice ? formatPrice(listingPrice) : 'the listed price'}. Make me an offer and we'll see!`,
        ];
      })(),
      // Bot is the BUYER. User (seller) has named or counter-offered a price.
      buyer: (() => {
        const offered = extractPrice(userText);
        if (offered && listingPrice) {
          if (offered > listingPrice * 0.95) return [
            `That's basically full price — any chance you could come down a bit? My budget is around ${formatPrice(listingPrice * 0.85)}.`,
            `Hmm, that's at the top of my budget. Could you do ${formatPrice(listingPrice * 0.85)}?`,
          ];
          if (offered > listingPrice * 0.80) return [
            `${formatPrice(offered)} works for me! How do we set up the pickup? 🤝`,
            `OK that's reasonable. Could we round it down to ${formatPrice(Math.floor(offered))}? Otherwise I'm in.`,
          ];
          return [
            `${formatPrice(offered)} sounds great, deal! 🎉 When can we meet?`,
            `That's a fair price, count me in. Just need to pay the 30% deposit, right?`,
          ];
        }
        return [
          `What's the lowest you'd go? My budget is around ${formatPrice(listingPrice ? listingPrice * 0.85 : 12)}.`,
          `Could you do ${formatPrice(listingPrice ? listingPrice * 0.85 : 12)}? That's all I can stretch to right now.`,
          `Any flexibility on the price? I'd appreciate a small discount 🙏`,
        ];
      })(),
    },
    meeting: {
      // Seller proposes / accepts meetup spots.
      seller: [
        `I can meet tomorrow morning at 8:15 before class — sound good?`,
        `How about Friday after school near the main gate? Works for me.`,
        `Let's say Wednesday at lunch — I'll be at the cafeteria entrance. 🍔`,
        `I'm free most days this week. What time suits you?`,
        `I usually hang around the courtyard after 4pm — drop by anytime.`,
      ],
      // Buyer proposes / asks for meetup spots.
      buyer: [
        `I'm usually free before school — say 8:15 AM near the main entrance? 🕗`,
        `What about tomorrow at lunch, near the library?`,
        `Could we meet after school on Friday, around 2:30 PM?`,
        `I'm flexible this week — when works best for you?`,
        `Could we meet at the school gate? Easier for me, I take the bus.`,
      ],
    },
    // CONDITION — swapped to fix the original bug.
    condition: {
      // Seller DESCRIBES the book's state.
      seller: [
        `It's in ${condStr} condition. ${listing?.description || 'No major damage to mention.'}`,
        `Used it for one school year. ${listing?.description ? listing.description : 'A few pencil notes in the margins, nothing too distracting.'}`,
        `Clean overall — no torn pages or stains. Just normal wear from a year of use.`,
        `Honestly the book held up well. Cover has a small crease but pages are intact.`,
      ],
      // Buyer ASKS about the book's state.
      buyer: [
        `Could you tell me a bit more about the condition? Any highlighting or notes inside?`,
        `Is there any damage I should know about before committing?`,
        `How many school years did you use it for?`,
        `Are the pages clean? I really don't like underlined textbooks 😅`,
      ],
    },
    thanks: {
      seller: [
        `Anytime! Let me know if you need anything else 🙂`,
        `Of course — happy to help. Looking forward to closing the deal!`,
        `No worries! Just ping me when you want to set up the pickup.`,
      ],
      buyer: [
        `Thanks for the quick reply! 🙏`,
        `Appreciate it — really useful info.`,
        `Cheers, that clears things up.`,
      ],
    },
    farewell: {
      seller: [
        `See you soon — message me when you're ready to meet! 👋`,
        `Talk later! Don't forget to pay the deposit so I can hold the book for you.`,
        `Ciao! Let me know how you want to proceed.`,
      ],
      buyer: [
        `Thanks again — I'll get back to you about the meetup soon 👋`,
        `Talk later! I'll think about it and message you.`,
        `Ciao, gotta run. I'll confirm later today.`,
      ],
    },
    general: {
      seller: [
        `Sure, happy to help 🙂 anything else you'd like to know?`,
        `Got it. Let me know if you want to arrange the pickup.`,
        `Makes sense. Just say the word when you're ready to reserve it.`,
        `Hmm, not 100% sure what you mean — could you rephrase?`,
      ],
      buyer: [
        `Got it, thanks for the info!`,
        `Cool. I'll think it over and get back to you.`,
        `Makes sense — let me check my schedule and I'll confirm.`,
        `Sorry, didn't quite follow — could you say that again?`,
      ],
    },
  };

  const pool = responses[intent]?.[botRole] || responses.general[botRole];
  return Array.isArray(pool) ? pool[Math.floor(Math.random() * pool.length)] : pool;
}

// ── CONVERSATION RENDERING ─────────────────────────────────────────────────────

function renderConvList() {
  const convs = DB.getConversationsForUser(currentUser.id);
  const container = document.getElementById('convItems');

  if (convs.length === 0) {
    container.innerHTML = `<div style="padding:20px;text-align:center;color:var(--ink-3);font-size:.85rem;">No conversations yet.<br><a href="announcements.html" style="color:var(--accent);">Browse listings →</a></div>`;
    return;
  }

  container.innerHTML = convs.map(c => {
    const otherId = c.buyerId === currentUser.id ? c.sellerId : c.buyerId;
    const other = DB.getUserById(otherId);
    const listing = DB.getListingById(c.listingId);
    const lastMsg = c.messages[c.messages.length - 1];
    const isActive = c.id === activeConvId;
    return `
      <div class="conv-item ${isActive ? 'active' : ''}" onclick="openConversation('${c.id}')">
        <div class="conv-avatar">${other?.name?.[0]?.toUpperCase() || '?'}</div>
        <div class="conv-info">
          <div class="conv-name">${escHtml(other?.name || 'Unknown')}</div>
          <div class="conv-preview">${listing ? escHtml(listing.bookTitle) : 'Book'}</div>
          ${lastMsg ? `<div class="conv-preview" style="margin-top:2px;">${lastMsg.senderId === currentUser.id ? 'You: ' : ''}${escHtml(lastMsg.text.slice(0,40))}…</div>` : ''}
        </div>
        <div class="conv-time">${lastMsg ? formatRelativeTime(lastMsg.ts) : ''}</div>
      </div>`;
  }).join('');
}

function formatRelativeTime(ts) {
  const diff = Date.now() - ts;
  if (diff < 60000) return 'just now';
  if (diff < 3600000) return Math.floor(diff / 60000) + 'm';
  if (diff < 86400000) return Math.floor(diff / 3600000) + 'h';
  return formatDate(ts);
}

function openConversation(convId) {
  activeConvId = convId;
  const conv = DB.getConversation(convId);
  if (!conv) return;

  const otherId = conv.buyerId === currentUser.id ? conv.sellerId : conv.buyerId;
  const other = DB.getUserById(otherId);
  const listing = DB.getListingById(conv.listingId);
  // In this specific conversation, am I the buyer or the seller?
  const iAmBuyer = conv.buyerId === currentUser.id;

  // Header
  const header = document.getElementById('chatHeader');
  const myRoleLabel = iAmBuyer ? 'BUYER' : 'SELLER';
  const myRoleClass = iAmBuyer ? 'buyer' : 'seller';
  header.innerHTML = `
    <div class="conv-avatar">${other?.name?.[0]?.toUpperCase() || '?'}</div>
    <div class="chat-header-info">
      <div class="chat-header-name">
        ${escHtml(other?.name || 'Unknown')}
        <span class="chat-role-badge chat-role-${myRoleClass}" title="Your role in this conversation">You: ${myRoleLabel}</span>
      </div>
      <div class="chat-header-sub">${listing ? escHtml(listing.bookTitle) + ' · ' + formatPrice(listing.price) : ''}</div>
    </div>
    <div style="margin-left:auto;display:flex;gap:8px;">
      ${iAmBuyer && listing ? `<button class="btn btn-primary btn-sm" onclick="quickBuy('${listing.id}','${otherId}')">🔒 Reserve book</button>` : ''}
    </div>`;

  document.getElementById('emptyChatState').style.display = 'none';
  const activeChat = document.getElementById('activeChat');
  activeChat.style.display = 'flex';
  activeChat.style.flexDirection = 'column';

  renderMessages(conv);
  renderConvList(); // update active state
}

function renderMessages(conv) {
  const container = document.getElementById('chatMessages');
  if (!conv || conv.messages.length === 0) {
    container.innerHTML = `<div style="text-align:center;color:var(--ink-3);font-size:.85rem;padding:24px;">Start the conversation! Say hi 👋</div>`;
    return;
  }
  container.innerHTML = conv.messages.map(m => {
    const isMe = m.senderId === currentUser.id;
    const isBot = m.senderId === 'bot';
    return `
      <div class="msg ${isMe ? 'mine' : isBot ? 'msg-bot' : ''}">
        ${!isMe ? `<div class="msg-avatar">${isBot ? '🤖' : '?'}</div>` : ''}
        <div>
          <div class="msg-bubble">${escHtml(m.text)}</div>
          <div class="msg-time">${formatRelativeTime(m.ts)}</div>
        </div>
        ${isMe ? `<div class="msg-avatar" style="background:var(--accent);">${currentUser.name[0]}</div>` : ''}
      </div>`;
  }).join('');
  container.scrollTop = container.scrollHeight;
}

function showTyping() {
  const container = document.getElementById('chatMessages');
  const el = document.createElement('div');
  el.id = 'typingIndicator';
  el.className = 'msg msg-bot typing-indicator';
  el.innerHTML = `<div class="msg-avatar">🤖</div><div class="msg-bubble"><div class="typing-dots"><span></span><span></span><span></span></div></div>`;
  container.appendChild(el);
  container.scrollTop = container.scrollHeight;
}

function hideTyping() {
  document.getElementById('typingIndicator')?.remove();
}

function handleKey(e) {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    sendMessage();
  }
}

function sendMessage() {
  if (!activeConvId || botTyping) return;
  const input = document.getElementById('chatInput');
  const text = input.value.trim();
  if (!text) return;

  // Save user message
  const msg = DB.addMessage(activeConvId, currentUser.id, text);
  input.value = '';
  renderMessages(DB.getConversation(activeConvId));
  renderConvList();

  // Trigger bot response
  triggerBot(text);
}

function triggerBot(userText) {
  if (!activeConvId) return;
  const conv = DB.getConversation(activeConvId);
  if (!conv) return;

  const listing = DB.getListingById(conv.listingId);
  // Bot plays the OPPOSITE side of the user in THIS specific conversation
  const iAmBuyer = conv.buyerId === currentUser.id;
  const botRole = iAmBuyer ? 'seller' : 'buyer';
  const intent = detectIntent(userText);

  botTyping = true;
  const thinkDelay = BOT_DELAYS.think[0] + Math.random() * (BOT_DELAYS.think[1] - BOT_DELAYS.think[0]);
  const typeDelay = BOT_DELAYS.type[0] + Math.random() * (BOT_DELAYS.type[1] - BOT_DELAYS.type[0]);

  setTimeout(() => {
    showTyping();
    setTimeout(() => {
      hideTyping();
      const responseText = getBotResponse(intent, userText, botRole, listing);
      DB.addMessage(activeConvId, 'bot', responseText);
      const updatedConv = DB.getConversation(activeConvId);
      renderMessages(updatedConv);
      renderConvList();
      botTyping = false;

      // If price intent and meeting hasn't been proposed, follow up
      if (intent === 'price' && !conv.meetingProposed) {
        setTimeout(() => {
          const followUp = botRole === 'seller'
            ? "Once we agree on price, I'll need you to pay the 30% deposit on the platform to reserve the book. 🔒"
            : "If we agree, could we meet near school? Easier to check the book in person.";
          DB.addMessage(activeConvId, 'bot', followUp);
          renderMessages(DB.getConversation(activeConvId));
          botTyping = false;
        }, 2000);
      }
    }, typeDelay);
  }, thinkDelay);
}

function quickBuy(listingId, sellerId) {
  const listing = DB.getListingById(listingId);
  if (!listing || listing.status !== 'active') { toast('This listing is no longer available', 'warning'); return; }
  const txn = DB.createTransaction(currentUser.id, sellerId, listingId);
  toast('Transaction created! Redirecting to pay deposit…', 'success', 3000);
  setTimeout(() => location.href = 'transactions.html', 1500);
}

function escHtml(s) {
  return String(s || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// ── INIT ───────────────────────────────────────────────────────────────────────

document.addEventListener('DOMContentLoaded', () => {
  currentUser = DB.currentUser();
  if (!currentUser) { location.href = 'auth.html?next=chat.html'; return; }

  renderConvList();

  // Auto-open if ?conv= param
  const params = new URLSearchParams(location.search);
  const convParam = params.get('conv');
  if (convParam) {
    setTimeout(() => openConversation(convParam), 100);
  }
});
</script>
</body>
</html>
